<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIディベートアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div id="login-screen">
      <div class="logo-placeholder">
        <p>ロゴの枠</p>
      </div>
      
      <h2>議論ゲーム</h2>
      <p>Are you ready?</p>
      
      <button class="start-btn" onclick="login()">スタート</button>
    </div>

    <div id="main-game" style="display: none;">
      <h1>AIディベートバトル</h1>

      <select id="theme">
        <option value="学校にスマホは必要か">学校にスマホは必要か</option>
        <option value="AIは人間の仕事を奪うか">AIは人間の仕事を奪うか</option>
        <option value="リモートワークは良いか">リモートワークは良いか</option>
      </select>

      <div id="chat"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="あなたの意見を書く">
        <button onclick="sendMessage()">送信</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
