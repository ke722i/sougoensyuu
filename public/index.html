<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIディベートバトル</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

button {
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}

.chat {
  height: 300px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
  margin: 20px 0;
  text-align: left;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

</style>
</head>

<body>

<div class="container">

<!-- タイトル -->
<div id="titleScreen" class="screen active">
  <h1>AIディベートバトル</h1>
  <p>テーマを選択</p>

  <button onclick="selectTheme('努力は才能に勝てる？')">努力は才能に勝てる？</button>
  <button onclick="selectTheme('AIは人間を超えるべき？')">AIは人間を超えるべき？</button>
  <button onclick="selectTheme('お金と幸せどっちが大事？')">お金と幸せどっちが大事？</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" class="screen">

  <h2 id="themeText"></h2>

  <button onclick="backToTitle()">← 戻る</button>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="あなたの意見を入力">
    <button onclick="sendMessage()">送信</button>
  </div>

</div>

</div>

<script>
let currentTheme = "";

// 画面切り替え
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// テーマ選択
function selectTheme(theme) {
  currentTheme = theme;
  document.getElementById("themeText").textContent = theme;
  document.getElementById("chat").innerHTML = "";
  showScreen("gameScreen");
}

// タイトルへ戻る
function backToTitle() {
  showScreen("titleScreen");
}

// チャット追加
function addChat(name, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.textContent = name + "： " + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 AI送信（ここが重要）
async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value;

  if (!message) return;

  addChat("あなた", message);

  const res = await fetch("/ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: message,
      theme: currentTheme   // ← テーマも送る
    })
  });

  const data = await res.json();

  const aiReply = data.choices[0].message.content;

  addChat("AI", aiReply);

  input.value = "";
}
</script>

</body>
</html>
